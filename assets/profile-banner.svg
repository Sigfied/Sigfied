<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500" role="img" aria-labelledby="title desc">
  <title id="title">GitHub profile banner</title>
  <desc id="desc">A restrained cyber banner with deep navy background, cyan accents, and profile copy.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="60%" stop-color="#0b1728"/>
      <stop offset="100%" stop-color="#09101b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2de2e6"/>
      <stop offset="100%" stop-color="#5eb7ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e2036" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#0a1422" stop-opacity="0.96"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="500" fill="url(#bg)"/>

  <g opacity="0.26" fill="none" stroke="#5eb7ff" stroke-width="1">
    <path d="M110 108H1490"/>
    <path d="M110 392H1490"/>
    <path d="M170 78V422"/>
    <path d="M1430 78V422"/>
  </g>

  <g opacity="0.18" fill="none" stroke="#2de2e6" stroke-width="1.2">
    <path d="M1180 125h150"/>
    <path d="M1180 125v78"/>
    <path d="M1310 205h120"/>
    <path d="M1310 205v108"/>
    <path d="M1180 343h220"/>
    <path d="M1180 343v-60"/>
  </g>

  <circle cx="1238" cy="164" r="4.5" fill="#2de2e6"/>
  <circle cx="1374" cy="205" r="4.5" fill="#5eb7ff"/>
  <circle cx="1420" cy="343" r="4.5" fill="#2de2e6"/>

  <rect x="96" y="86" width="1408" height="328" rx="28" fill="url(#panel)" stroke="#20415f" stroke-opacity="0.55"/>
  <rect x="96" y="86" width="1408" height="6" rx="3" fill="url(#accent)"/>

  <g transform="translate(150 164)" fill="#f3f7ff" font-family="Inter, Segoe UI, Helvetica Neue, Arial, sans-serif">
    <text x="0" y="0" font-size="34" font-weight="600" letter-spacing="0.2">Hi, I’m Sigfied.</text>
    <text x="0" y="64" font-size="62" font-weight="700" letter-spacing="-0.7">I like building systems, tools,</text>
    <text x="0" y="126" font-size="62" font-weight="700" letter-spacing="-0.7">and ideas into something real.</text>
    <text x="0" y="182" font-size="25" font-weight="400" fill="#b6c7db">Full-stack products, AI features, workflow tooling.</text>
  </g>

  <g opacity="0.95" transform="translate(1030 128)">
    <rect x="0" y="0" width="390" height="232" rx="22" fill="#091525" stroke="#284865" stroke-opacity="0.9"/>
    <rect x="24" y="24" width="126" height="10" rx="5" fill="#2de2e6"/>
    <rect x="24" y="48" width="228" height="8" rx="4" fill="#173149"/>
    <rect x="24" y="68" width="184" height="8" rx="4" fill="#173149"/>
    <rect x="24" y="108" width="320" height="1.5" fill="#1f3952"/>
    <rect x="24" y="128" width="148" height="10" rx="5" fill="#5eb7ff"/>
    <rect x="24" y="152" width="278" height="8" rx="4" fill="#173149"/>
    <rect x="24" y="172" width="210" height="8" rx="4" fill="#173149"/>
    <rect x="24" y="196" width="104" height="10" rx="5" fill="#2de2e6"/>
  </g>

  <g opacity="0.35" fill="none" stroke="#5eb7ff" stroke-width="1">
    <path d="M150 330h210"/>
    <path d="M150 356h138"/>
  </g>
